statements_es:
  - El alma es un poema que el viento escribió
  - Las estrellas lloran luz sobre la tierra dormida
  - Cada noche una canción renace en el silencio
  - El mar guarda los secretos que el cielo olvidó
  - La belleza vive en las grietas del tiempo
  - El fuego del deseo nunca conoce el invierno
  - Las palabras son semillas que florecen en el alma
  - El horizonte es una promesa que la aurora cumple
  - En la sombra del recuerdo late la eternidad
  - La poesía es el puente entre el miedo y la esperanza

